<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Kênh Chứng Chỉ</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #222; color: white; max-width: 600px; margin: 0 auto; }
        h2 { border-bottom: 1px solid #444; padding-bottom: 10px; color: #ffcc00; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; background: #333; color: white; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 15px; background: #007aff; color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; margin-top: 10px; font-size: 16px; }
        .item { background: #333; padding: 15px; margin-top: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #444; }
        .delete { background: #ff3b30; width: auto; padding: 8px 15px; margin: 0; font-size: 12px; }
    </style>
</head>
<body>

    <h2>🔥 THÊM ỨNG DỤNG MỚI</h2>
    
    <input type="text" id="appName" placeholder="Tên App (Ví dụ: ESign VIP)">
    <input type="text" id="appVersion" placeholder="Phiên bản (Ví dụ: 1.0)">
    <input type="text" id="appIcon" placeholder="Link Ảnh Icon (Link ảnh)">
    <input type="text" id="appPlist" placeholder="Link File Plist (https://kenhchungchi.com/xxx.plist)">
    
    <button onclick="addApp()">LƯU LÊN SERVER</button>

    <h2>DANH SÁCH ĐANG CHẠY</h2>
    <div id="list"></div>

    <script>
        // CẤU HÌNH FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAvFfWNrT1-AAfs3YsuXJ3I1EVbDj4fjxs",
            authDomain: "kenhchungchi.firebaseapp.com",
            projectId: "kenhchungchi",
            storageBucket: "kenhchungchi.firebasestorage.app",
            messagingSenderId: "960063891062",
            appId: "1:960063891062:web:f23537252707456f192157"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function addApp() {
            const name = document.getElementById('appName').value;
            const version = document.getElementById('appVersion').value;
            const icon = document.getElementById('appIcon').value;
            const plist = document.getElementById('appPlist').value;

            if(!name || !plist) return alert("Thiếu tên hoặc link Plist!");

            const newPostKey = db.ref().child('apps').push().key;
            db.ref('apps/' + newPostKey).set({
                id: newPostKey,
                name: name,
                version: version,
                icon: icon,
                plist: plist
            }, (error) => {
                if (error) alert("Lỗi: " + error.message);
                else {
                    alert("✅ Đã thêm thành công!");
                    document.getElementById('appName').value = '';
                    document.getElementById('appPlist').value = '';
                }
            });
        }

        db.ref('apps').on('value', (snapshot) => {
            const list = document.getElementById('list');
            list.innerHTML = '';
            snapshot.forEach((child) => {
                const app = child.val();
                list.innerHTML += `
                    <div class="item">
                        <div>
                            <strong>${app.name}</strong> <span style="color:#888">(v${app.version})</span>
                        </div>
                        <button class="delete" onclick="deleteApp('${app.id}')">Xóa</button>
                    </div>
                `;
            });
        });

        window.deleteApp = function(key) {
            if(confirm('Chắc chắn xóa app này?')) {
                db.ref('apps/' + key).remove();
            }
        }
    </script>
</body>
</html>
