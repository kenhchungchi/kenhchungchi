<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - iSign Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; }
        .glass-effect {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="text-gray-800 font-sans min-h-screen">

    <!-- MÀN HÌNH ĐĂNG NHẬP -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-500/30">
                    <i class="fa-solid fa-shield-halved text-white text-3xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-900">Quản Trị Hệ Thống</h2>
                <p class="text-sm text-gray-500 mt-1">Vui lòng đăng nhập để tiếp tục</p>
            </div>

            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" id="email" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors" placeholder="admin@domain.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu</label>
                    <input type="password" id="password" required class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors" placeholder="••••••••">
                </div>
                <button type="submit" id="login-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-colors shadow-md flex items-center justify-center gap-2">
                    Đăng Nhập
                </button>
                <p id="login-error" class="text-sm text-red-500 text-center hidden"></p>
            </form>
            <div class="mt-6 text-center text-xs text-gray-400">
                Chỉ dành cho quản trị viên hệ thống.
            </div>
        </div>
    </div>

    <!-- MÀN HÌNH QUẢN TRỊ (Ẩn mặc định) -->
    <div id="admin-dashboard" class="hidden">
        <nav class="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center">
                        <i class="fa-solid fa-shield text-white"></i>
                    </div>
                    <span class="font-bold text-xl">Admin<span class="text-blue-600">Panel</span></span>
                </div>
                <div class="flex items-center gap-4">
                    <a href="index.html" class="text-sm font-medium text-gray-500 hover:text-blue-600 transition">
                        <i class="fa-solid fa-eye mr-1"></i> Xem Web
                    </a>
                    <button id="logout-btn" class="text-sm font-bold text-red-500 hover:text-red-700 bg-red-50 px-3 py-1.5 rounded-lg transition-colors">
                        Đăng xuất <i class="fa-solid fa-right-from-bracket ml-1"></i>
                    </button>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col lg:flex-row gap-8">
            
            <!-- Form Thêm App -->
            <div class="w-full lg:w-1/3">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 sticky top-24">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-plus-circle text-blue-600"></i> Thêm Ứng Dụng Mới
                    </h2>
                    <form id="add-app-form" class="space-y-4">
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1">Tên Ứng dụng/Chứng chỉ *</label>
                            <input type="text" id="appName" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm" placeholder="VD: ESign VIP">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1">Mô tả ngắn *</label>
                            <input type="text" id="appDesc" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm" placeholder="VD: Công cụ ký IPA trực tiếp...">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1">Link Icon (Hình ảnh) *</label>
                            <input type="url" id="appIcon" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm" placeholder="https://i.imgur.com/...">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 mb-1">Link Tải Xuống (URL/IPA) *</label>
                            <input type="url" id="appUrl" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm" placeholder="https://...">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-semibold text-gray-500 mb-1">Phân Loại *</label>
                                <select id="appType" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                                    <option value="esign">Ký IPA (ESign)</option>
                                    <option value="cert">Chứng Chỉ</option>
                                    <option value="mods">App Mods</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-500 mb-1">Nhãn (Badge)</label>
                                <input type="text" id="appBadge" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="VD: HOT">
                            </div>
                        </div>
                        <button type="submit" id="submit-btn" class="w-full py-2.5 mt-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg shadow-sm transition-colors text-sm flex justify-center items-center gap-2">
                            <span>Lưu Dữ Liệu</span>
                        </button>
                        <p id="form-msg" class="text-xs text-center font-medium hidden"></p>
                    </form>
                </div>
            </div>

            <!-- Danh sách App -->
            <div class="w-full lg:w-2/3">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="p-6 border-b border-gray-200 flex justify-between items-center bg-gray-50/50">
                        <h2 class="text-lg font-bold flex items-center gap-2">
                            <i class="fa-solid fa-list text-gray-600"></i> Quản Lý Dữ Liệu
                        </h2>
                        <span class="text-xs font-medium bg-blue-100 text-blue-700 px-2.5 py-1 rounded-full" id="total-count">0 mục</span>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-50 text-gray-500 text-xs uppercase tracking-wider">
                                    <th class="p-4 font-semibold border-b border-gray-200">Icon</th>
                                    <th class="p-4 font-semibold border-b border-gray-200">Thông tin</th>
                                    <th class="p-4 font-semibold border-b border-gray-200">Loại</th>
                                    <th class="p-4 font-semibold border-b border-gray-200">Lượt Tải</th>
                                    <th class="p-4 font-semibold border-b border-gray-200 text-right">Hành động</th>
                                </tr>
                            </thead>
                            <tbody id="app-table-body" class="text-sm divide-y divide-gray-100">
                                <tr>
                                    <td colspan="5" class="p-8 text-center text-gray-400">Đang tải dữ liệu...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- Firebase Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";
        // Import thêm module Authentication
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-auth.js";

        // ==========================================
        // DÁN CẤU HÌNH FIREBASE CỦA BẠN VÀO ĐÂY
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCKvkiK4PYQcCA2aIWj0tn47XgusXISWE0",
            authDomain: "kenhchungchi1.firebaseapp.com",
            projectId: "kenhchungchi1",
            storageBucket: "kenhchungchi1.firebasestorage.app",
            messagingSenderId: "446452172842",
            appId: "1:446452172842:web:bd799d059b4cf158e21b53"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appsCollection = collection(db, "apps");

        const loginScreen = document.getElementById('login-screen');
        const adminDashboard = document.getElementById('admin-dashboard');

        // ==========================================
        // HỆ THỐNG AUTHENTICATION (ĐĂNG NHẬP/ĐĂNG XUẤT)
        // ==========================================
        
        // Lắng nghe trạng thái đăng nhập
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Đã đăng nhập: Ẩn form login, hiện dashboard, load dữ liệu
                loginScreen.classList.add('hidden');
                adminDashboard.classList.remove('hidden');
                loadAdminData();
            } else {
                // Chưa đăng nhập: Hiện form login
                loginScreen.classList.remove('hidden');
                adminDashboard.classList.add('hidden');
            }
        });

        // Xử lý nút Đăng nhập
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const errorText = document.getElementById('login-error');

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang kiểm tra...';
            btn.disabled = true;

            signInWithEmailAndPassword(auth, email, password)
                .then(() => {
                    errorText.classList.add('hidden');
                })
                .catch((error) => {
                    errorText.textContent = "Sai email hoặc mật khẩu. Vui lòng thử lại!";
                    errorText.classList.remove('hidden');
                    btn.innerHTML = 'Đăng Nhập';
                    btn.disabled = false;
                });
        });

        // Xử lý nút Đăng xuất
        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth);
        });

        // ==========================================
        // CÁC CHỨC NĂNG QUẢN TRỊ (Chỉ chạy khi đã Đăng Nhập)
        // ==========================================
        function loadAdminData() {
            // 1. Render Danh Sách App Realtime
            onSnapshot(appsCollection, (snapshot) => {
                const tbody = document.getElementById('app-table-body');
                document.getElementById('total-count').innerText = `${snapshot.size} mục`;
                
                if(snapshot.empty) {
                    tbody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-gray-400">Chưa có dữ liệu nào. Hãy thêm ứng dụng đầu tiên!</td></tr>`;
                    return;
                }

                let html = '';
                snapshot.forEach(document => {
                    const data = document.data();
                    const id = document.id;
                    
                    let typeColor = data.type === 'esign' ? 'bg-blue-100 text-blue-700' : 
                                   (data.type === 'cert' ? 'bg-purple-100 text-purple-700' : 'bg-orange-100 text-orange-700');
                    
                    let typeName = data.type === 'esign' ? 'Ký IPA' : 
                                  (data.type === 'cert' ? 'Chứng Chỉ' : 'Mods');

                    html += `
                        <tr class="hover:bg-gray-50/50 transition-colors">
                            <td class="p-4">
                                <img src="${data.icon}" alt="icon" class="w-10 h-10 rounded-lg object-cover shadow-sm border border-gray-200" onerror="this.src='https://placehold.co/100'">
                            </td>
                            <td class="p-4">
                                <div class="font-bold text-gray-800">${data.name} ${data.badge ? `<span class="ml-2 px-1.5 py-0.5 bg-red-100 text-red-600 text-[10px] rounded">${data.badge}</span>` : ''}</div>
                                <div class="text-xs text-gray-500 mt-1 truncate max-w-[200px]">${data.desc}</div>
                            </td>
                            <td class="p-4">
                                <span class="px-2.5 py-1 rounded-md text-[11px] font-bold uppercase tracking-wider ${typeColor}">${typeName}</span>
                            </td>
                            <td class="p-4 font-semibold text-gray-600">${data.downloads || 0}</td>
                            <td class="p-4 text-right">
                                <button onclick="window.deleteApp('${id}')" class="w-8 h-8 rounded-full bg-red-50 text-red-500 hover:bg-red-500 hover:text-white transition-colors">
                                    <i class="fa-solid fa-trash-can text-sm"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
                tbody.innerHTML = html;
            }, (error) => {
                console.error(error);
                alert("Bạn không có quyền truy cập dữ liệu. Vui lòng kiểm tra lại tài khoản.");
            });
        }

        // 2. Thêm App Mới
        document.getElementById('add-app-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const msg = document.getElementById('form-msg');
            
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang lưu...';
            btn.disabled = true;

            const newApp = {
                name: document.getElementById('appName').value,
                desc: document.getElementById('appDesc').value,
                icon: document.getElementById('appIcon').value,
                url: document.getElementById('appUrl').value,
                type: document.getElementById('appType').value,
                badge: document.getElementById('appBadge').value,
                downloads: 0,
                createdAt: new Date()
            };

            try {
                await addDoc(appsCollection, newApp);
                document.getElementById('add-app-form').reset();
                msg.textContent = "Thêm thành công!";
                msg.className = "text-xs text-center font-medium text-green-600 block";
            } catch (error) {
                console.error(error);
                msg.textContent = "Lỗi: Cần đăng nhập để thực hiện.";
                msg.className = "text-xs text-center font-medium text-red-600 block";
            }

            btn.innerHTML = '<span>Lưu Dữ Liệu</span>';
            btn.disabled = false;
            setTimeout(() => { msg.classList.add('hidden'); }, 3000);
        });

        // 3. Xóa App
        window.deleteApp = async function(id) {
            if(confirm("Bạn có chắc chắn muốn xóa ứng dụng này không?")) {
                try {
                    await deleteDoc(doc(db, "apps", id));
                } catch (error) {
                    alert("Lỗi khi xóa. Bạn đã hết phiên đăng nhập hoặc không có quyền.");
                }
            }
        };
    </script>
</body>
</html>
